<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Admin</title>
    <style>
        /* Existing styles from the previous examples... */

        /* Dashboard styles */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .dashboard-item {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .dashboard-item h3 {
            color: #333;
        }
    </style>
</head>

<body>

    <!-- Existing HTML structure... -->

    <section>
        <h2>Dashboard</h2>

        <div class="dashboard">
            <!-- Dashboard items -->
            <div class="dashboard-item">
                <h3>Total Photos</h3>
                <p>256</p>
            </div>
            <div class="dashboard-item">
                <h3>Monthly Visitors</h3>
                <p>12,345</p>
            </div>
            <div class="dashboard-item">
                <h3>Most Viewed Photo</h3>
                <p>Photo ABC</p>
            </div>
            <div class="dashboard-item">
                <h3>Uploads Today</h3>
                <p>30</p>
            </div>
            <!-- Add more dashboard items as needed -->
        </div>
    </section>

    <!-- Existing HTML structure... -->

</body>

</html>

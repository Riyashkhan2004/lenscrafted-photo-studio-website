<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Add some basic styling to the image */
    .image-container {
      position: relative;
      width: 300px;
      height: 200px;
      overflow: hidden;
    }

    /* Style the image */
    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease-in-out;
    }

    /* Add a hover effect to scale the image */
    .image-container:hover img {
      transform: scale(1.1);
    }

    /* Optional: Add some additional styling for better visuals */
    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      padding: 10px;
      box-sizing: border-box;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .image-container:hover .caption {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Wrap the image in a container div -->
  <div class="image-container">
    <img src="wedding.jfif alt="Your Image">
    <!-- Optional: Add a caption or any other content -->
    <div class="caption">
      <p>Your Caption Here</p>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Admin - Settings</title>
    <style>
        
        .settings-container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-section h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .settings-option label {
            flex: 1;
            margin-right: 10px;
        }

        .settings-option input,
        .settings-option select {
            flex: 2;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .settings-button {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .settings-button:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

    

    <section>
        <h2>Settings</h2>

        <div class="settings-container">
            <div class="settings-section">
                <h3>General Settings</h3>

                <div class="settings-option">
                    <label for="siteTitle">Site Title:</label>
                    <input type="text" id="siteTitle" name="siteTitle" placeholder="Enter your site title">
                </div>

                <div class="settings-option">
                    <label for="language">Language:</label>
                    <select id="language" name="language">
                        <option value="english">English</option>
                        <option value="spanish">Spanish</option>
                        <option value="french">French</option>
                        
                    </select>
                </div>
            </div>

           

            <button class="settings-button" type="button">Save Settings</button>
        </div>
    </section>

    

</body>

</html>
